#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  depends = [ "prepare" ]
  run = "next dev --inspect"

  [tasks.start]
  run = "next start"

  [tasks.build]
  depends = [ "prepare" ]
  run = "next build"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  depends = [ "prepare" ]
  run = "tsc --noEmit"

  [tasks.fix]
  depends = [ "prepare" ]
  run = "prisma format"

  # TODO disabled until GA
  #[tasks.publish]
  #run = "npm publish --access public --non-interactive"

[env]
_.path = "./node_modules/.bin"
