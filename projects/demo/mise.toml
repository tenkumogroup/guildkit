#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  wait_for = "//projects/guildkit:build"
  run = "guildkit dev"

  [tasks.build]
  wait_for = "//projects/guildkit:build"
  run = "guildkit build"

  [tasks.lint]
  depends = [ "sync" ]
  run = "tsc --noEmit"

[env]
_.path = "./node_modules/.bin"
